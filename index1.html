                <h2>Tame Impala</h2>
                <figure>
                    <img src="./bilder/image.png" alt="">
                    <figcaption>Tame Impala är ett musikprojekt skapat av Kevin Parker från Australien, där han själv
                        skriver, producerar och spelar nästan all musik. Projektet är känt för sitt drömmiga och
                        psykedeliska sound som blandar rock, synthar och elektronisk pop på ett väldigt unikt sätt.
                        Det som gör Tame Impala speciellt är hur detaljerad och atmosfärisk musiken är, med mycket
                        effekter, mjuka synthar och låtar som känns nästan hypnotiska. Texterna handlar ofta om
                        relationer, ensamhet, förändring och självreflektion. Från början var soundet mer psykedelisk
                        rock, men med album som Currents blev musiken mer elektronisk och modern, vilket gjorde
                        projektet enormt populärt världen över.</figcaption>
                </figure>
            </article>

            <article>
                <h2>Populäraste Album</h2>
                <figure>
                    <img src="./bilder/image copy 4.png" alt="">
                    <figcaption>Currents är det bästa Tame Impala har gjort eftersom det känns som albumet där Kevin
                        Parker verkligen perfekterade sitt sound. Det blandar psykedelisk rock med synthar och pop på
                        ett sätt som låter både drömmigt och emotionellt samtidigt. Varje låt flyter ihop perfekt och
                        albumet känns som en hel resa om förändring, relationer och att försöka gå vidare. Produktionen
                        är också extremt detaljerad utan att kännas övergjord, vilket gör att låtar som “Let It Happen”
                        och “The Less I Know The Better” fortfarande låter unika idag.</figcaption>
                </figure>
                <p></p>
            </article>
