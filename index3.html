                <h2>The Neighbourhood</h2>
                <figure>
                    <img src="./bilder/image copy 5.png" alt="">
                    <figcaption>The Neighbourhood är ett amerikanskt band som blandar alternativ rock, indie, R&B och
                        mörk pop för att skapa ett väldigt atmosfäriskt och känslosamt sound. Bandet blev mest känt
                        genom låten Sweater Weather, som fick stor spridning för sin lugna men samtidigt mörka vibe.
                        Det som gör The Neighbourhood speciella är hur deras musik känns både minimalistisk och
                        emotionell samtidigt. De använder ofta långsamma beats, mjuka gitarrer och mörka texter om
                        relationer, ensamhet och identitet. Deras svartvita estetik och melankoliska sound har också
                        gjort att de fått en väldigt stark och igenkännbar stil.</figcaption>
                </figure>

            </article>

            <article>
                <h2>Wiped out!</h2>
                <figure>
                    <img src="./bilder/image copy 6.png" alt="">
                    <figcaption>Wiped Out! är ofta sett som The Neighbourhoods bästa album eftersom det utvecklade deras
                        mörka och atmosfäriska sound ännu mer än tidigare. Albumet blandar alternativ rock, R&B och
                        drömmig indie på ett sätt som känns både emotionellt och filmiskt samtidigt.
                        Det som gör albumet speciellt är hur konsekvent stämningen är genom hela projektet, med
                        långsamma beats, stora synthar och väldigt personliga texter om ensamhet, relationer och
                        identitet. Låtar som “Daddy Issues”, “Cry Baby” och “The Beach” gjorde också albumet ikoniskt
                        och hjälpte bandet skapa den melankoliska stil de är mest kända för.</figcaption>
                </figure>

            </article>
